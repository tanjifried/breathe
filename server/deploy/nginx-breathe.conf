server {
  listen 100.64.245.59:80;
  server_name miyamoto.tail6fc25e.ts.net;
  return 301 https://$host$request_uri;
}

server {
  listen 100.64.245.59:443 ssl http2;
  server_name miyamoto.tail6fc25e.ts.net;

  ssl_certificate /home/celeron/miyamoto.tail6fc25e.ts.net.crt;
  ssl_certificate_key /home/celeron/miyamoto.tail6fc25e.ts.net.key;

  client_max_body_size 25m;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-Frame-Options DENY always;

  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /ws {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  location /voices/ {
    alias /var/breathe/voices/;
    add_header Cache-Control "max-age=86400";
    autoindex off;
  }
}
