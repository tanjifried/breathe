<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breathe Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-root">
      <h1>Breathe Settings</h1>
      <p class="options-intro">Configure server sync for partner status.</p>

      <form id="settings-form" novalidate>
        <div>
          <label class="field-label" for="server-url">Server URL</label>
          <input
            id="server-url"
            name="server-url"
            type="url"
            placeholder="https://yourdomain.com"
            autocomplete="off"
          />
        </div>

        <div>
          <label class="field-label" for="jwt-token">JWT Token</label>
          <textarea
            id="jwt-token"
            name="jwt-token"
            rows="4"
            placeholder="Paste your JWT authentication token here..."
            autocomplete="off"
          ></textarea>
        </div>

        <div>
          <label class="field-label" for="timeout-duration">Default Timeout Duration (Minutes)</label>
          <input
            id="timeout-duration"
            name="timeout-duration"
            type="number"
            min="1"
            max="120"
            placeholder="20"
            autocomplete="off"
          />
        </div>

        <label class="toggle-row" for="dark-mode">
          <input id="dark-mode" name="dark-mode" type="checkbox" />
          <div class="toggle-switch"></div>
          <span>Enable dark mode for Breathe on Messenger</span>
        </label>

        <section class="option-section" aria-labelledby="widget-position-heading">
          <h3 id="widget-position-heading" class="option-heading">Widget position</h3>
          <p class="option-desc">Choose a corner or drag the widget directly on Messenger.</p>
          <div id="pos-grid" class="pos-grid">
            <button type="button" class="pos-btn" data-pos="top-left">Top left</button>
            <button type="button" class="pos-btn" data-pos="top-right">Top right</button>
            <button type="button" class="pos-btn" data-pos="bottom-left">Bottom left</button>
            <button type="button" class="pos-btn" data-pos="bottom-right">Bottom right</button>
          </div>
          <button type="button" id="reset-pos-btn" class="reset-btn">Reset to default position</button>
        </section>

        <div class="actions">
          <button type="submit">Save</button>
          <span id="save-message" aria-live="polite"></span>
        </div>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
